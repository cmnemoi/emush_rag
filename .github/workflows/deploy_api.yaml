name: Continuous Delivery

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  APP_IMAGE: ghcr.io/${{ github.repository }}/api
  GRAFANA_IMAGE: ghcr.io/${{ github.repository }}/grafana

jobs:
  build-and-push:
    name: Build Docker images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image-tag: ${{ steps.image-tag.outputs.value }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container

      - name: Get image tag
        id: image-tag
        run: echo "value=sha-$(echo ${{ github.sha }} | cut -c1-7)" >> "$GITHUB_OUTPUT"

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push app image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.app
          push: true
          tags: |
            ${{ env.APP_IMAGE }}:${{ steps.image-tag.outputs.value }}
            ${{ env.APP_IMAGE }}:latest
          cache-from: type=gha,scope=app
          cache-to: type=gha,scope=app,mode=max

      - name: Build and push grafana image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.grafana
          push: true
          tags: |
            ${{ env.GRAFANA_IMAGE }}:${{ steps.image-tag.outputs.value }}
            ${{ env.GRAFANA_IMAGE }}:latest
          cache-from: type=gha,scope=grafana
          cache-to: type=gha,scope=grafana,mode=max

  deploy:
    name: Deploy to server
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - uses: actions/checkout@v4

      - name: Copy compose file to server
        uses: appleboy/scp-action@v1
        with:
          host: ${{ vars.SERVER_HOST }}
          username: ${{ vars.SERVER_USERNAME }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ vars.SERVER_SSH_PORT }}
          source: "compose.prod.yml"
          target: ~/www

      - name: Deploy to server
        uses: appleboy/ssh-action@v1.2.5
        env:
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image-tag }}
          GF_SECURITY_ADMIN_PASSWORD: ${{ secrets.GF_SECURITY_ADMIN_PASSWORD }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY_PROD }}
          VECTOR_STORE_URL: ${{ vars.VECTOR_STORE_URL }}
          VECTOR_STORE_PORT: ${{ vars.VECTOR_STORE_PORT }}
        with:
          envs: IMAGE_TAG,GF_SECURITY_ADMIN_PASSWORD,OPENAI_API_KEY,VECTOR_STORE_URL,VECTOR_STORE_PORT
          host: ${{ vars.SERVER_HOST }}
          username: ${{ vars.SERVER_USERNAME }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ vars.SERVER_SSH_PORT }}
          script: |
            set -euo pipefail
            cd ~/www
            docker compose -f compose.prod.yml up -d --remove-orphans
            docker image prune -f
