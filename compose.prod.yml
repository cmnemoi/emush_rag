services:
  app:
    image: ghcr.io/cmnemoi/emush-rag/api:${IMAGE_TAG:-latest}
    labels:
      - traefik.enable=true
      - traefik.http.routers.app.rule=Host(`api.askneron.cmnemoi.com`)
      - traefik.http.routers.app.entrypoints=websecure
      - traefik.http.routers.app.tls.certresolver=letsencrypt
      - traefik.http.services.app.loadbalancer.server.port=8080
    env_file:
      - .env
    depends_on:
      - vector_store
      - jaeger
    networks:
      - emush_rag
      - traefik-proxy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  vector_store:
    image: chromadb/chroma:1.3.5
    volumes:
      - ./chroma:/data
    restart: unless-stopped
    networks:
      - emush_rag

  jaeger:
    image: jaegertracing/all-in-one:1.71.0
    environment:
      - COLLECTOR_ZIPKIN_HOST_PORT=:9411
    networks:
      - emush_rag
    restart: unless-stopped

  grafana:
    image: ghcr.io/cmnemoi/emush-rag/grafana:${IMAGE_TAG:-latest}
    labels:
      - traefik.enable=true
      - traefik.http.routers.grafana.rule=Host(`grafana.askneron.cmnemoi.com`)
      - traefik.http.routers.grafana.entrypoints=websecure
      - traefik.http.routers.grafana.tls.certresolver=letsencrypt
      - traefik.http.services.grafana.loadbalancer.server.port=3000
    volumes:
      - grafana-data:/var/lib/grafana
    env_file:
      - .env
    depends_on:
      - jaeger
    networks:
      - emush_rag
      - traefik-proxy
    restart: unless-stopped

networks:
  emush_rag:
    driver: bridge
  traefik-proxy:
    external: true

volumes:
  grafana-data:
